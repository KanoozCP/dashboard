<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Report - Kanooz</title>
    
    <!-- Modern Font Inter & Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Tailwind CSS 4 -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --kcp-indigo: #1e3a8a;
            --kcp-blue: #2563eb;
            --kcp-orange: #f97316;
            --kcp-gradient: linear-gradient(135deg, #1e3a8a, #2563eb, #f97316);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #0f172a;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        h1 { font-family: 'Poppins', sans-serif; }

        @keyframes kcpGrad {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animate-kcp-gradient {
            background: var(--kcp-gradient);
            background-size: 200% 200%;
            animation: kcpGrad 6s ease infinite;
        }

        .glass-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .home-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            color: #475569;
            font-size: 0.875rem;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .home-btn:hover {
            background: #f8fafc;
            color: var(--kcp-blue);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        main {
            width: 100%;
            background: #ffffff;
            position: relative;
            flex: 1;
        }

        iframe {
            width: 100%;
            height: calc(100vh - 80px); /* Adjusting for header height */
            border: none;
            outline: none;
            display: block;
            background: #ffffff;
        }

        .header-hidden { transform: translateY(-100%); }
    </style>
</head>
<body>

    <!-- Header -->
    <header id="mainHeader" class="glass-header">
        <div class="max-w-7xl mx-auto px-6 h-20 md:h-24 flex items-center justify-between">
            <a href="https://kanooz.com/" target="_blank" class="flex items-center gap-4 group">
                <img src="https://kanooz.com/assets/images/logo.png" alt="Kanooz Logo" class="h-10 md:h-14 transition-transform group-hover:scale-105">
            </a>

            <div class="absolute left-1/2 -translate-x-1/2">
                <div class="animate-kcp-gradient p-[1px] rounded-2xl shadow-xl">
                    <div class="bg-white/10 backdrop-blur-xl px-4 md:px-10 py-3 rounded-[15px] border border-white/20 text-center">
                        <h1 class="text-white font-extrabold text-sm md:text-xl tracking-tight uppercase whitespace-nowrap">
                            DASHBOARD REPORT
                        </h1>
                    </div>
                </div>
            </div>

            <a href="https://kanoozcp.github.io/" class="home-btn relative z-10">
                <i data-lucide="home" class="w-[18px] h-[18px]"></i>
                <span class="hidden sm:inline">Back to Portal</span>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <iframe 
            src="https://kanooz365-my.sharepoint.com/personal/naved_kanooz_com/_layouts/15/embed.aspx?UniqueId=cb7a5f9a-a26e-4bd4-871e-6727511cdae8&action=embedview&wdStartOn=1&view=FitH" 
            title="Dashboard Report"
            allowfullscreen>
        </iframe>
    </main>

    <!-- Refined Reduced Footer -->
    <footer class="border-t border-slate-200/60 bg-white/30 backdrop-blur-3xl relative z-10 w-full">
        <div class="max-w-7xl mx-auto px-6 py-4 md:py-6">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                
                <div class="flex flex-wrap items-center justify-center md:justify-start gap-x-6 gap-y-3">
                    <div class="flex items-center gap-2 group cursor-default">
                        <i data-lucide="map-pin" class="w-3.5 h-3.5 text-slate-400"></i>
                        <span class="text-slate-600 font-medium text-[11px]">Dammam, KSA</span>
                    </div>

                    <a href="mailto:Info@kanooz.com" class="flex items-center gap-2 group">
                        <i data-lucide="mail" class="w-3.5 h-3.5 text-blue-500"></i>
                        <span class="text-slate-600 font-medium text-[11px] group-hover:text-blue-600 transition-colors">Info@kanooz.com</span>
                    </a>

                    <a href="tel:+96692000043" class="flex items-center gap-2 group">
                        <i data-lucide="phone" class="w-3.5 h-3.5 text-emerald-500"></i>
                        <span class="text-slate-600 font-medium text-[11px] group-hover:text-emerald-600 transition-colors">+966 92000043</span>
                    </a>
                </div>

                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-3">
                        <p class="text-slate-400 text-[10px] font-medium">
                            © 2026 Kanooz Contracting Est.
                        </p>
                        <span class="text-[8px] font-bold text-slate-300 uppercase tracking-[0.2em] px-2 py-0.5 border border-slate-200 rounded-full select-none">
                            v1.0.0
                        </span>
                    </div>
                    <img src="https://kanooz.com/assets/images/logo.png" alt="Kanooz" class="h-8 opacity-40 grayscale hover:grayscale-0 transition-opacity">
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Header scroll effect
        let lastScroll = 0;
        const header = document.getElementById('mainHeader');

        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            if (currentScroll <= 0) {
                header.classList.remove('header-hidden');
                return;
            }

            if (currentScroll > lastScroll && !header.classList.contains('header-hidden')) {
                header.classList.add('header-hidden');
            } else if (currentScroll < lastScroll && header.classList.contains('header-hidden')) {
                header.classList.remove('header-hidden');
            }
            lastScroll = currentScroll;
        });
    </script>
</body>
</html>
