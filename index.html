<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Central Planning - Kanooz</title>

  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden; /* Prevent scrolling of the main page since iframe handles its own content */
      height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #f8fafc;
    }

    @keyframes kcpGrad {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .animate-kcp-gradient {
      background: linear-gradient(135deg, #0f172a, #1d4ed8, #f97316);
      background-size: 200% 200%;
      animation: kcpGrad 6s ease infinite;
    }

    header {
      height: 80px;
      background: #ffffff;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      position: relative;
      z-index: 10;
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    }

    .title-pill {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 30px;
      border-radius: 12px;
      color: white;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    main {
      flex: 1;
      width: 100%;
      background: #f1f5f9;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    footer {
      height: 64px;
      background: white;
      border-top: 1px solid #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 20px;
    }

    .footer-line {
      width: 48px;
      height: 2px;
      background-color: #2563eb;
      margin-bottom: 6px;
      border-radius: 99px;
    }

    @media (max-width: 640px) {
      header { padding: 0 20px; }
      .title-pill { font-size: 14px; padding: 8px 16px; width: auto; white-space: nowrap; }
      .logo { height: 40px !important; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <a href="https://kanooz.com/" target="_blank" aria-label="Kanooz Home">
      <img src="https://lh3.googleusercontent.com/d/1oQr4RoR9ON5vK6U_oIN2hW0HdnpEloO8" alt="Kanooz Logo" class="logo" style="height: 60px; object-fit: contain;" />
    </a>

    <div class="title-pill animate-kcp-gradient">
      Central Planning
    </div>

    <!-- Spacer for symmetry -->
    <div style="width: 60px;" class="hidden sm:block"></div>
  </header>

  <!-- Main Content (Full Body PDF/Dashboard) -->
  <main>
    <iframe 
      src="https://kanooz365-my.sharepoint.com/personal/naved_kanooz_com/_layouts/15/embed.aspx?UniqueId=cb7a5f9a-a26e-4bd4-871e-6727511cdae8" 
      frameborder="0" 
      scrolling="no" 
      allowfullscreen 
      title="MP & EQ Dashboard">
    </iframe>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-line"></div>
    <div class="text-slate-500 font-semibold text-xs">© 2026 Kanooz – Central Planning</div>
    <div class="text-[9px] text-slate-400 italic mt-0.5">Note: The above links will only work if you have a Valid Kanooz login ID.</div>
  </footer>

</body>
</html>
